            <LogoSVG size={44} />
            <div>
              <h1 className="paper-biz-name">{biz.name}</h1>
              <div className="paper-biz-sub">{biz.subtitle}</div>
            </div>
          </div>
          <div className="paper-biz-details">
            {biz.address && <div>{biz.address}</div>}
            {(biz.taxType || biz.taxId) && <div>{biz.taxType}: {biz.taxId}</div>}
            {biz.phone && <div>טלפון: {biz.phone}</div>}
            {biz.email && <div>דוא״ל: {biz.email}</div>}
          </div>
        </div>
        <div style={{ textAlign: 'left' }}>
          <h2 className="paper-title">{isInvoice ? 'חשבון עסקה' : 'קבלה'}</h2>
          <div className="paper-meta">
            <div>מס׳: <strong>{doc.number}</strong></div>
            <div>תאריך: {fmtDate(doc.date)}</div>
            {!isInvoice && doc.invoiceNumber && <div>כנגד חשבון עסקה #{doc.invoiceNumber}</div>}
          </div>
        </div>
      </div>

      <div className="paper-client-box">
        <div className="paper-client-label">לכבוד</div>
        <div style={{ fontWeight: 500, fontSize: 14 }}>{doc.clientName}</div>
        {cd.taxId && <div>ת.ז./ח.פ.: {cd.taxId}</div>}
        {cd.address && <div>{cd.address}</div>}
        {cd.phone && <div>טלפון: {cd.phone}</div>}
        {cd.email && <div>דוא״ל: {cd.email}</div>}
      </div>

      {isInvoice && doc.subject && <div className="paper-subject">הנדון: {doc.subject}</div>}
      {!isInvoice && !doc.invoiceNumber && doc.description && <div className="paper-subject">בגין: {doc.description}</div>}

      {isInvoice ? (
        <>
          <table className="paper-table">
            <thead>
              <tr>
                <th style={{ width: 60 }}>קוד</th><th>תיאור</th>
                <th style={{ width: 60 }}>כמות</th><th style={{ width: 90 }}>מחיר יח׳</th><th style={{ width: 100 }}>סה״כ</th>
              </tr>
            </thead>
            <tbody>
              {doc.lines.map((l, i) => (
                <tr key={i}>
                  <td>{l.code || ''}</td>
                  <td>{l.description}</td>
                  <td className="num">{Number(l.qty) || 0}</td>
                  <td className="num">{fmtILS(l.price)}</td>
                  <td className="num" style={{ fontWeight: 500 }}>{fmtILS((Number(l.qty) || 0) * (Number(l.price) || 0))}</td>
                </tr>
              ))}
            </tbody>
          </table>

          <div style={{ marginTop: 12, display: 'flex', justifyContent: 'flex-start' }}>
            <div className="paper-totals-box"><span>סה״כ לתשלום</span><span>{fmtILS(total)}</span></div>
          </div>

          {paid > 0 && (
            <div className="paper-pay-summary">
              <div>שולם עד כה: {fmtILS(paid)}</div>
              <div style={{ fontWeight: 500 }}>יתרה לתשלום: {fmtILS(remain)}</div>
            </div>
          )}
        </>
      ) : (
        <>
          <div className="paper-receipt-amount">התקבל סך: {fmtILS(doc.amount)}</div>
          <div style={{ fontSize: 13, lineHeight: 1.9 }}>
            <div><strong>אמצעי תשלום:</strong> {methodLabel(doc.method)}</div>
            {doc.invoiceNumber && <div><strong>כנגד חשבון עסקה מס׳:</strong> {doc.invoiceNumber}</div>}
            {doc.notes && <div><strong>הערות:</strong> {doc.notes}</div>}
          </div>
        </>
      )}

      {isInvoice && doc.notes && (
        <div style={{ marginTop: 16, fontSize: 12, color: '#555' }}>
          <strong>הערות:</strong> {doc.notes}
        </div>
      )}

      <div className="paper-footer">
        {(isInvoice ? (biz.footerNote || 'מסמך זה אינו מהווה חשבונית מס') : 'תודה על התשלום')} • {biz.name} {biz.phone && `• ${biz.phone}`}
      </div>
    </div>
  );
}

// ============ Reusable UI ============
function Modal({ title, children, onClose, wide }) {
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} className="modal" style={{ maxWidth: wide ? 820 : 520 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16, borderBottom: '0.5px solid var(--border)', paddingBottom: 12 }}>
          <h2 style={{ fontSize: 17, fontWeight: 500 }}>{title}</h2>
          <button onClick={onClose} className="icon-btn" style={{ border: 'none' }}><IconX size={18} /></button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return <div style={{ marginBottom: 12 }}><label>{label}</label>{children}</div>;
}

// DateInput: displays DD/MM/YYYY, stores ISO YYYY-MM-DD
function DateInput({ value, onChange }) {
  const [text, setText] = useState(isoToDMY(value));
  const [invalid, setInvalid] = useState(false);

  useEffect(() => { setText(isoToDMY(value)); setInvalid(false); }, [value]);

  const autoFormat = (raw) => {
    // Strip non-digits, then reinsert slashes as the user types
    const digits = raw.replace(/[^\d]/g, '').slice(0, 8);
    let out = digits;
    if (digits.length >= 5) out = `${digits.slice(0,2)}/${digits.slice(2,4)}/${digits.slice(4)}`;
    else if (digits.length >= 3) out = `${digits.slice(0,2)}/${digits.slice(2)}`;
    return out;
  };

  const handleChange = (e) => {
    const formatted = autoFormat(e.target.value);
    setText(formatted);
    // If complete, try to commit
    if (formatted.replace(/[^\d]/g, '').length === 8) {
      const iso = dmyToIso(formatted);
      if (iso) {
        setInvalid(false);
        onChange(iso);
      } else {
        setInvalid(true);
      }
    } else {
      setInvalid(false);
    }
  };

  const handleBlur = () => {
    if (!text) { onChange(''); return; }
    const iso = dmyToIso(text);
    if (iso) {
      setInvalid(false);
      onChange(iso);
      setText(isoToDMY(iso));
    } else {
      setInvalid(true);
    }
  };

  return (
    <input
      type="text"
      inputMode="numeric"
      placeholder="dd/mm/yyyy"
      value={text}
      onChange={handleChange}
      onBlur={handleBlur}
      maxLength={10}
      style={invalid ? { borderColor: 'var(--danger)', boxShadow: '0 0 0 2px var(--danger-bg)' } : {}}
    />
  );
}

// ============ Sync Indicator ============
function SyncIndicator({ status, error, onRefresh }) {
  const styles = {
    loading: { bg: 'var(--info-bg)', fg: 'var(--info-text)', label: '⏳ טוען...' },
    saving: { bg: 'var(--info-bg)', fg: 'var(--info-text)', label: '💾 שומר...' },
    ok: { bg: 'var(--success-bg)', fg: 'var(--success)', label: '✓ מסונכרן' },
    error: { bg: 'var(--danger-bg)', fg: 'var(--danger)', label: '✗ שגיאת סנכרון' },
    idle: { bg: 'var(--surface-2)', fg: 'var(--text-muted)', label: '⏸' },
  };
  const s = styles[status] || styles.idle;
  return (
    <div
      onClick={status === 'error' ? onRefresh : undefined}
      title={status === 'error' ? ('שגיאה: ' + error + ' — לחיצה לרענון') : ''}
      style={{
        fontSize: 12, padding: '6px 10px',
        background: s.bg, color: s.fg,
        borderRadius: 'var(--radius)',
        cursor: status === 'error' ? 'pointer' : 'default',
        whiteSpace: 'nowrap',
      }}
    >
      {s.label}
    </div>
  );
}

// ============ Setup Screen ============
function SetupScreen({ onConfigured }) {
  const [url, setUrl] = useState('');
  const [secret, setSecret] = useState('');
  const [testing, setTesting] = useState(false);
  const [error, setError] = useState('');

  const test = async () => {
    setError('');
    if (!url.trim() || !secret.trim()) {
      setError('יש למלא את שני השדות');
      return;
    }
    setTesting(true);
    // Temporarily save config to test
    saveConfig({ url: url.trim(), secret: secret.trim() });
    try {
      await remoteLoad();
      onConfigured();
    } catch (err) {
      setError('חיבור נכשל: ' + (err.message || err));
      clearConfig();
    } finally {
      setTesting(false);
    }
  };

  return (
    <div style={{ maxWidth: 520, margin: '3rem auto', padding: '1.5rem' }}>
      <div style={{ display: 'flex', gap: 12, alignItems: 'center', marginBottom: 16 }}>
        <LogoSVG size={48} />
        <div>
          <h1 style={{ fontSize: 22, fontWeight: 500 }}>הגדרה ראשונית — סנכרון</h1>
          <p style={{ fontSize: 13, color: 'var(--text-muted)', margin: '4px 0 0' }}>
            פעם אחת בכל מכשיר, להתחברות לגיליון Google
          </p>
        </div>
      </div>

      <div className="card" style={{ padding: '1.25rem 1.5rem' }}>
        <p style={{ fontSize: 13, color: 'var(--text-muted)', marginTop: 0, lineHeight: 1.7 }}>
          יש להזין את הנתונים שקיבלת מ-Google Apps Script (ראה <strong>setup-instructions.md</strong>).
        </p>

        <div style={{ marginBottom: 12 }}>
          <label>Web App URL</label>
          <input
            value={url}
            onChange={(e) => setUrl(e.target.value)}
            placeholder="https://script.google.com/macros/s/..."
            dir="ltr"
            style={{ fontFamily: 'monospace', fontSize: 12 }}
          />
        </div>

        <div style={{ marginBottom: 12 }}>
          <label>Secret (סיסמה)</label>
          <input
            value={secret}
            onChange={(e) => setSecret(e.target.value)}
            placeholder="הסיסמה שהגדרת בשורת SECRET בסקריפט"
            dir="ltr"
            style={{ fontFamily: 'monospace', fontSize: 12 }}
          />
        </div>

        {error && (
          <div style={{ background: 'var(--danger-bg)', color: 'var(--danger)', padding: '10px 12px', borderRadius: 'var(--radius)', fontSize: 13, marginBottom: 12 }}>
            {error}
          </div>
        )}

        <div style={{ display: 'flex', gap: 8 }}>
          <button className="primary" onClick={test} disabled={testing}>
            {testing ? 'בודק...' : 'חיבור ובדיקה'}
          </button>
        </div>

        <div style={{ marginTop: 20, paddingTop: 16, borderTop: '0.5px solid var(--border)', fontSize: 12, color: 'var(--text-faint)', lineHeight: 1.7 }}>
          💡 <strong>טיפ:</strong> אותם URL ו-Secret יש להזין בכל מכשיר (מחשב וטלפון) כדי שיסתנכרנו.
        </div>
      </div>
    </div>
  );
}

root.render(<App />);
