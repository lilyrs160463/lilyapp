<style>

    --warning: #b46b2a;

    --success: #2e7d4f;
    --success-bg: #e4f1e8;

    --info-bg: #e6f1fb;

  .paper-biz-sub { font-size: 13px; color: #666; margin: 2px 0 0; }
  .paper-biz-details { font-size: 12px; color: #444; line-height: 1.7; margin-top: 8px; }
  .paper-title { font-size: 22px; font-weight: 600; margin: 0; text-align: left; }
  .paper-meta { font-size: 13px; color: #555; text-align: left; margin-top: 6px; line-height: 1.7; }
  .paper-client-box { background: #f6f4ed; padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; line-height: 1.8; }

<body>
<div id="root"></div>
<div id="print-root" style="display:none;"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

// ============ Default Business Details ============
const DEFAULT_BUSINESS = {
  name: 'לילי שפירא',
  subtitle: 'מטפלת באמנות',
  address: 'רמז דוד 26, תל אביב',
  taxId: '058103995',
  taxType: 'עוסק פטור',
  phone: '052-4748308',
  email: 'lilyrs@hotmail.com',
  footerNote: 'מסמך זה אינו מהווה חשבונית מס',
};

// ============ Storage (Google Sheets via Apps Script) ============
const CONFIG_KEY = 'lily_sync_config_v1';
const CACHE_KEY = 'lily_sync_cache_v1';

function loadConfig() {
  try {
    const raw = localStorage.getItem(CONFIG_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}
function saveConfig(cfg) {
  localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));
}
function clearConfig() {
  localStorage.removeItem(CONFIG_KEY);
  localStorage.removeItem(CACHE_KEY);
}

// Local cache so the app still shows data if network is slow
function loadLocalCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}
function saveLocalCache(data) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(data)); }
  catch (e) { console.error('cache save failed', e); }
}

// Call Apps Script. We use "text/plain" content-type to avoid CORS preflight.
async function callBackend(action, data) {
  const cfg = loadConfig();
  if (!cfg || !cfg.url || !cfg.secret) throw new Error('No config');
  const body = JSON.stringify({ action, secret: cfg.secret, data });
  const res = await fetch(cfg.url, {
    method: 'POST',
    mode: 'cors',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body,
    redirect: 'follow',
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'Unknown error');
  return json;
}

async function remoteLoad() {
  const res = await callBackend('load');
  return res.data;
}
async function remoteSave(data) {
  await callBackend('save', data);
}

// ============ Utils ============
const uid = () => Math.random().toString(36).slice(2, 10);
const fmtILS = (n) => new Intl.NumberFormat('he-IL', { style: 'currency', currency: 'ILS', minimumFractionDigits: 2 }).format(Number(n) || 0);
const fmtDate = (iso) => {
  if (!iso) return '';
  // iso is YYYY-MM-DD; format as DD/MM/YYYY
  const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso);
  if (m) return `${m[3]}/${m[2]}/${m[1]}`;
  // fallback for other formats
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  return `${dd}/${mm}/${d.getFullYear()}`;
};
const todayISO = () => {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
};

// Convert ISO (YYYY-MM-DD) <-> display (DD/MM/YYYY)
const isoToDMY = (iso) => {
  if (!iso) return '';
  const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso);
  return m ? `${m[3]}/${m[2]}/${m[1]}` : '';
};
const dmyToIso = (dmy) => {
  if (!dmy) return '';
  // Accept DD/MM/YYYY, DD-MM-YYYY, DD.MM.YYYY, DDMMYYYY
  const cleaned = dmy.replace(/[^\d]/g, '');
  if (cleaned.length !== 8) return null; // incomplete
  const dd = cleaned.slice(0, 2);
  const mm = cleaned.slice(2, 4);
  const yyyy = cleaned.slice(4, 8);
  const d = new Date(`${yyyy}-${mm}-${dd}`);
  if (isNaN(d.getTime())) return null;
  // Validate the parts match (catches invalid like 31/02/2025)
  if (d.getDate() !== parseInt(dd) || d.getMonth() + 1 !== parseInt(mm) || d.getFullYear() !== parseInt(yyyy)) return null;
  return `${yyyy}-${mm}-${dd}`;
};

function methodLabel(m) {
  return { cash: 'מזומן', check: 'שיק', transfer: 'העברה בנקאית', credit: 'אשראי', bit: 'ביט', paybox: 'פייבוקס', other: 'אחר' }[m] || m;
}

// ============ List Export Helpers ============
// Turn a worksheet into a proper Excel Table: bold header with fill color,
// freeze top row, autofilter arrows, and alternating row shading.
function styleAsTable(ws, numCols, numDataRows) {
  if (!ws['!ref']) return;
  const lastCol = XLSX.utils.encode_col(numCols - 1);
  const lastRow = numDataRows + 1; // +1 for header
  // Enable autofilter across the full table range
  ws['!autofilter'] = { ref: `A1:${lastCol}${lastRow}` };
  // Freeze the header row so it stays visible while scrolling
  ws['!freeze'] = { xSplit: 0, ySplit: 1 };
  // Style header row (bold, white on dark green, centered)
  for (let c = 0; c < numCols; c++) {
    const addr = XLSX.utils.encode_cell({ r: 0, c });
    if (ws[addr]) {
      ws[addr].s = {
        font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 11 },
        fill: { fgColor: { rgb: '2A4D3A' }, patternType: 'solid' },
        alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
        border: {
          top: { style: 'thin', color: { rgb: '000000' } },
          bottom: { style: 'thin', color: { rgb: '000000' } },
          left: { style: 'thin', color: { rgb: '000000' } },
          right: { style: 'thin', color: { rgb: '000000' } },
        },
      };
    }
  }
  // Alternating row fill + thin borders for data cells
  for (let r = 1; r <= numDataRows; r++) {
    const isAlt = r % 2 === 0;
    for (let c = 0; c < numCols; c++) {
      const addr = XLSX.utils.encode_cell({ r, c });
      if (!ws[addr]) continue;
      ws[addr].s = {
        ...(ws[addr].s || {}),
        fill: isAlt ? { fgColor: { rgb: 'F6F4ED' }, patternType: 'solid' } : undefined,
        border: {
          top: { style: 'hair', color: { rgb: 'CCCCCC' } },
          bottom: { style: 'hair', color: { rgb: 'CCCCCC' } },
          left: { style: 'hair', color: { rgb: 'CCCCCC' } },
          right: { style: 'hair', color: { rgb: 'CCCCCC' } },
        },
      };
    }
  }
}

function exportInvoicesXLSX(invoices, paidByInvoice, getInvoiceTotal) {
  if (!window.XLSX) { alert('ספריית האקסל לא נטענה. בדקי חיבור לאינטרנט ונסי שוב.'); return; }
  const wb = XLSX.utils.book_new();

  // Sheet 1: Invoice summary
  const summary = invoices.map(inv => {
    const total = getInvoiceTotal(inv);
    const paid = paidByInvoice[inv.id] || 0;
    const remain = total - paid;
    const status = paid >= total - 0.001 && total > 0 ? 'שולם' : paid > 0.001 ? 'שולם חלקית' : 'לא שולם';
    return {
      'מס׳ חשבון': inv.number,
      'תאריך': isoToDMY(inv.date),
      'לקוח': inv.clientName || '',
      'ת.ז./ח.פ.': (inv.clientDetails || {}).taxId || '',
      'נושא': inv.subject || '',
      'סה״כ': Number(total.toFixed(2)),
      'שולם': Number(paid.toFixed(2)),
      'יתרה': Number(remain.toFixed(2)),
      'סטטוס': status,
      'הערות': inv.notes || '',
    };
  });
  const ws1 = XLSX.utils.json_to_sheet(summary);
  ws1['!cols'] = [
    { wch: 12 }, { wch: 12 }, { wch: 24 }, { wch: 14 }, { wch: 28 },
    { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 14 }, { wch: 28 }
  ];
  ws1['!views'] = [{ RTL: true }];
  // Apply currency format to money columns (F, G, H = cols 5, 6, 7)
  for (let r = 1; r <= summary.length; r++) {
    for (const c of [5, 6, 7]) {
      const addr = XLSX.utils.encode_cell({ r, c });
      if (ws1[addr]) ws1[addr].z = '#,##0.00\\ "₪"';
    }
  }
  styleAsTable(ws1, 10, summary.length);
  XLSX.utils.book_append_sheet(wb, ws1, 'חשבוניות');

  // Sheet 2: Line items
  const lineRows = [];
  for (const inv of invoices) {
    for (const l of (inv.lines || [])) {
      lineRows.push({
        'מס׳ חשבון': inv.number,
        'תאריך': isoToDMY(inv.date),
        'לקוח': inv.clientName || '',
        'קוד פריט': l.code || '',
        'תיאור': l.description || '',
        'כמות': Number(l.qty) || 0,
        'מחיר יחידה': Number(l.price) || 0,
        'סה״כ שורה': Number(((Number(l.qty) || 0) * (Number(l.price) || 0)).toFixed(2)),
      });
    }
  }
  const ws2 = XLSX.utils.json_to_sheet(lineRows);
  ws2['!cols'] = [
    { wch: 12 }, { wch: 12 }, { wch: 24 }, { wch: 12 },
    { wch: 32 }, { wch: 10 }, { wch: 12 }, { wch: 14 }
  ];
  ws2['!views'] = [{ RTL: true }];
  for (let r = 1; r <= lineRows.length; r++) {
    for (const c of [6, 7]) {
      const addr = XLSX.utils.encode_cell({ r, c });
      if (ws2[addr]) ws2[addr].z = '#,##0.00\\ "₪"';
    }
  }
  styleAsTable(ws2, 8, lineRows.length);
  XLSX.utils.book_append_sheet(wb, ws2, 'שורות חשבוניות');

  XLSX.writeFile(wb, `חשבוניות-${todayISO()}.xlsx`);
}

function exportReceiptsXLSX(receipts) {
  if (!window.XLSX) { alert('ספריית האקסל לא נטענה. בדקי חיבור לאינטרנט ונסי שוב.'); return; }
  const wb = XLSX.utils.book_new();
  const rows = receipts.map(r => ({
    'מס׳ קבלה': r.number,
    'תאריך': isoToDMY(r.date),
    'לקוח': r.clientName || '',
    'ת.ז./ח.פ.': (r.clientDetails || {}).taxId || '',
    'כנגד חשבון': r.invoiceNumber || '',
    'תיאור / בגין': r.invoiceNumber ? '' : (r.description || ''),
    'סכום': Number((Number(r.amount) || 0).toFixed(2)),
    'אמצעי תשלום': methodLabel(r.method),
    'הערות': r.notes || '',
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [
    { wch: 12 }, { wch: 12 }, { wch: 24 }, { wch: 14 },
    { wch: 14 }, { wch: 28 }, { wch: 12 }, { wch: 16 }, { wch: 28 }
  ];
  ws['!views'] = [{ RTL: true }];
  for (let r = 1; r <= rows.length; r++) {
    const addr = XLSX.utils.encode_cell({ r, c: 6 });
    if (ws[addr]) ws[addr].z = '#,##0.00\\ "₪"';
  }
  styleAsTable(ws, 9, rows.length);
  XLSX.utils.book_append_sheet(wb, ws, 'קבלות');
  XLSX.writeFile(wb, `קבלות-${todayISO()}.xlsx`);
}

function printInvoicesList(invoices, paidByInvoice, getInvoiceTotal, business) {
  const biz = business || DEFAULT_BUSINESS;
  const total = invoices.reduce((s, inv) => s + getInvoiceTotal(inv), 0);
  const paid = invoices.reduce((s, inv) => s + (paidByInvoice[inv.id] || 0), 0);
  const rows = invoices.map(inv => {
    const t = getInvoiceTotal(inv);
    const p = paidByInvoice[inv.id] || 0;
    const status = p >= t - 0.001 && t > 0 ? 'שולם' : p > 0.001 ? 'חלקי' : 'לא שולם';
    return { num: inv.number, date: isoToDMY(inv.date), client: inv.clientName || '', subject: inv.subject || '', total: t, paid: p, remain: t - p, status };
  });
  const html = `<!DOCTYPE html><html dir="rtl" lang="he"><head><meta charset="utf-8"><title>רשימת חשבוניות</title>
    <style>
      @page { size: A4 landscape; margin: 12mm; }
      body { font-family: -apple-system, "Segoe UI", Arial, sans-serif; color: #111; direction: rtl; margin: 0; padding: 10px; }
      h1 { font-size: 18px; margin: 0 0 4px; color: #2a4d3a; }
      .sub { font-size: 12px; color: #666; margin-bottom: 16px; }
      table { width: 100%; border-collapse: collapse; font-size: 12px; }
      th { background: #f1efe8; text-align: right; padding: 6px 8px; border: 1px solid #ccc; font-weight: 500; }
      td { padding: 6px 8px; border: 1px solid #ddd; }
      td.num { text-align: left; white-space: nowrap; }
      .totals { margin-top: 14px; padding: 10px 14px; background: #f6f4ed; border-radius: 4px; font-size: 13px; display: flex; gap: 24px; }
      .totals strong { color: #2a4d3a; }
    </style></head><body>
    <h1>${biz.name} — רשימת חשבוניות</h1>
    <div class="sub">הופק בתאריך ${isoToDMY(todayISO())} • ${invoices.length} חשבוניות</div>
    <table>
      <thead><tr>
        <th>מס׳</th><th>תאריך</th><th>לקוח</th><th>נושא</th>
        <th>סה״כ</th><th>שולם</th><th>יתרה</th><th>סטטוס</th>
      </tr></thead>
      <tbody>
        ${rows.map(r => `<tr>
          <td class="num">${r.num}</td><td class="num">${r.date}</td>
          <td>${r.client}</td><td>${r.subject}</td>
          <td class="num">${fmtILS(r.total)}</td>
          <td class="num">${fmtILS(r.paid)}</td>
          <td class="num">${fmtILS(r.remain)}</td>
          <td>${r.status}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    <div class="totals">
      <span>סה״כ חויב: <strong>${fmtILS(total)}</strong></span>
      <span>סה״כ שולם: <strong>${fmtILS(paid)}</strong></span>
      <span>יתרה לגבייה: <strong>${fmtILS(total - paid)}</strong></span>
    </div>
    </body></html>`;
  const w = window.open('', '_blank', 'width=1100,height=800');

// ============ Main App ============
function App() {
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState('home');
  const [needsSetup, setNeedsSetup] = useState(false);
  const [syncStatus, setSyncStatus] = useState('idle'); // idle | loading | saving | error | ok
  const [syncError, setSyncError] = useState('');

  const [business, setBusiness] = useState(DEFAULT_BUSINESS);
  const [clients, setClients] = useState([]);
  const [items, setItems] = useState([]);
  const [invoices, setInvoices] = useState([]);
  const [receipts, setReceipts] = useState([]);
  const [counters, setCounters] = useState({ invoice: 1000, receipt: 2000 });
  const [lastBackup, setLastBackup] = useState(null);
  const [dismissedBackup, setDismissedBackup] = useState(false);

  // Initial load
  const doRemoteLoad = async () => {
    setSyncStatus('loading');
    setSyncError('');
    try {
      const d = await remoteLoad();
      setBusiness({ ...DEFAULT_BUSINESS, ...(d.business || {}) });
      setClients(d.clients || []);
      setItems(d.items || []);
      setInvoices(d.invoices || []);
      setReceipts(d.receipts || []);
      setCounters(d.counters || { invoice: 1000, receipt: 2000 });
      setLastBackup(d.lastBackup || null);
      saveLocalCache(d);
      setSyncStatus('ok');
      setLoaded(true);
    } catch (err) {
      console.error(err);
      // Fall back to local cache if remote fails
      const cache = loadLocalCache();
      if (cache) {
        setBusiness({ ...DEFAULT_BUSINESS, ...(cache.business || {}) });
        setClients(cache.clients || []);
        setItems(cache.items || []);
        setInvoices(cache.invoices || []);
        setReceipts(cache.receipts || []);
        setCounters(cache.counters || { invoice: 1000, receipt: 2000 });
        setLastBackup(cache.lastBackup || null);
        setLoaded(true);
      }
      setSyncStatus('error');
      setSyncError(String(err.message || err));
    }
  };

  useEffect(() => {
    const cfg = loadConfig();
    if (!cfg) {
      setNeedsSetup(true);
      setLoaded(true);
      return;
    }
    doRemoteLoad();
  }, []);

  // Debounced save — waits 1.5s after last change, then saves to remote
  useEffect(() => {
    if (!loaded || needsSetup) return;
    const data = { business, clients, items, invoices, receipts, counters, lastBackup };
    saveLocalCache(data); // always cache immediately
    const timer = setTimeout(async () => {
      setSyncStatus('saving');
      try {
        await remoteSave(data);
        setSyncStatus('ok');
        setSyncError('');
      } catch (err) {
        console.error('save failed', err);
        setSyncStatus('error');
        setSyncError(String(err.message || err));
      }
    }, 1500);
    return () => clearTimeout(timer);
  }, [business, clients, items, invoices, receipts, counters, lastBackup, loaded, needsSetup]);

  const paidByInvoice = useMemo(() => {
    const map = {};
    for (const r of receipts) map[r.invoiceId] = (map[r.invoiceId] || 0) + Number(r.amount || 0);
    return map;
  }, [receipts]);

  const getInvoiceTotal = (inv) => (inv.lines || []).reduce((s, l) => s + (Number(l.qty) || 0) * (Number(l.price) || 0), 0);

  const exportBackup = () => {
    const data = { business, clients, items, invoices, receipts, counters, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `backup-${todayISO()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setLastBackup(new Date().toISOString());
    setDismissedBackup(false);
  };

  const importBackup = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (data.business) setBusiness({ ...DEFAULT_BUSINESS, ...data.business });
        if (data.clients) setClients(data.clients);
        if (data.items) setItems(data.items);
        if (data.invoices) setInvoices(data.invoices);
        if (data.receipts) setReceipts(data.receipts);
        if (data.counters) setCounters(data.counters);
        if (data.lastBackup) setLastBackup(data.lastBackup);
        alert('הגיבוי נטען בהצלחה');
      } catch (err) {
        alert('שגיאה בטעינת הקובץ');
      }
    };
    reader.readAsText(file);
  };

  // Setup / first run
  if (needsSetup) {
    return <SetupScreen onConfigured={() => { setNeedsSetup(false); doRemoteLoad(); }} />;
  }
  if (!loaded) return <div style={{ padding: '2rem', textAlign: 'center', color: 'var(--text-muted)' }}>טוען מהשרת...</div>;

  const navItems = [
    { id: 'home', label: 'בית', Icon: IconHome },
    { id: 'clients', label: 'לקוחות', Icon: IconUsers },
    { id: 'invoices', label: 'חשבוניות', Icon: IconFile },
    { id: 'receipts', label: 'קבלות', Icon: IconReceipt },
    { id: 'reports', label: 'דוחות', Icon: IconChart },
    { id: 'items', label: 'פריטים', Icon: IconPkg },
    { id: 'settings', label: 'הגדרות', Icon: IconSettings },
  ];

  // Backup reminder: show if never backed up AND has data, OR last backup is >30 days old
  const hasData = clients.length > 0 || invoices.length > 0 || receipts.length > 0;
  const daysSinceBackup = lastBackup
    ? Math.floor((new Date() - new Date(lastBackup)) / (1000 * 60 * 60 * 24))
    : null;
  const showBackupReminder = hasData && !dismissedBackup && (daysSinceBackup === null || daysSinceBackup >= 30);

  return (
    <div>
      <header style={{ borderBottom: '0.5px solid var(--border)', paddingBottom: '1rem', marginBottom: '1.25rem' }}>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '1rem', justifyContent: 'space-between', alignItems: 'flex-start' }}>
          <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
            <LogoSVG size={44} />
            <div>
              <h1 style={{ fontSize: 20, fontWeight: 500 }}>{business.name}</h1>
              <p style={{ fontSize: 13, color: 'var(--text-muted)', margin: '2px 0 0' }}>{business.subtitle} — ניהול לקוחות וחשבוניות</p>
            </div>
          </div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
            <SyncIndicator status={syncStatus} error={syncError} onRefresh={doRemoteLoad} />
            <button onClick={exportBackup} style={{ fontSize: 13 }}><IconDownload size={14} /> גיבוי</button>
            <label style={{ display: 'inline-flex', alignItems: 'center', gap: 4, padding: '8px 14px', border: '0.5px solid var(--border-strong)', borderRadius: 'var(--radius)', cursor: 'pointer', fontSize: 13, background: 'var(--surface)' }}>
              <IconUpload size={14} /> טעינה
              <input type="file" accept="application/json" onChange={(e) => e.target.files[0] && importBackup(e.target.files[0])} style={{ display: 'none' }} />
            </label>
          </div>
        </div>
      </header>

      <nav style={{ display: 'flex', gap: 4, flexWrap: 'wrap', marginBottom: '1.25rem', borderBottom: '0.5px solid var(--border)', paddingBottom: 8, overflowX: 'auto' }}>
        {navItems.map(({ id, label, Icon }) => (
          <button key={id} onClick={() => setTab(id)} className={`tab-btn ${tab === id ? 'active' : ''}`} style={{ whiteSpace: 'nowrap' }}>
            <Icon size={15} /> {label}
          </button>
        ))}
      </nav>

      {showBackupReminder && (
        <div style={{
          background: 'var(--warning-bg)', color: 'var(--warning)',
          border: '0.5px solid var(--warning)', borderRadius: 'var(--radius)',
          padding: '10px 14px', marginBottom: '1rem',
          display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12, flexWrap: 'wrap', fontSize: 13
        }}>
          <div>
            {daysSinceBackup === null
              ? '⚠️ טרם ביצעת גיבוי. מומלץ לייצא גיבוי ולשמור אותו ב-Google Drive או Dropbox.'
              : `⚠️ עברו ${daysSinceBackup} ימים מאז הגיבוי האחרון. מומלץ לייצא גיבוי חדש.`}
          </div>
          <div style={{ display: 'flex', gap: 6 }}>
            <button onClick={exportBackup} style={{ fontSize: 12, padding: '4px 10px' }}><IconDownload size={12} /> גיבוי עכשיו</button>
            <button onClick={() => setDismissedBackup(true)} style={{ fontSize: 12, padding: '4px 10px' }}>לא עכשיו</button>
          </div>
        </div>
      )}

      {tab === 'home' && <HomeTab {...{ clients, invoices, receipts, paidByInvoice, getInvoiceTotal, setTab }} />}
      {tab === 'clients' && <ClientsTab {...{ clients, setClients, invoices, receipts, paidByInvoice, getInvoiceTotal, business }} />}
      {tab === 'invoices' && <InvoicesTab {...{ invoices, setInvoices, clients, items, receipts, paidByInvoice, getInvoiceTotal, counters, setCounters, business }} />}
      {tab === 'receipts' && <ReceiptsTab {...{ receipts, setReceipts, invoices, clients, counters, setCounters, getInvoiceTotal, paidByInvoice, business }} />}
      {tab === 'reports' && <ReportsTab {...{ invoices, receipts, clients, paidByInvoice, getInvoiceTotal, business }} />}
      {tab === 'items' && <ItemsTab {...{ items, setItems }} />}
      {tab === 'settings' && <SettingsTab {...{ business, setBusiness, counters, setCounters, clients, items, invoices, receipts, setClients, setItems, setInvoices, setReceipts, lastBackup }} />}
    </div>
  );
}

// ============ Reports ============
function ReportsTab({ invoices, receipts, clients, paidByInvoice, getInvoiceTotal, business }) {
  const allYears = useMemo(() => {
    const ys = new Set();
    for (const inv of invoices) if (inv.date) ys.add(inv.date.slice(0, 4));
    for (const r of receipts) if (r.date) ys.add(r.date.slice(0, 4));
    return Array.from(ys).sort().reverse();
  }, [invoices, receipts]);

  const [year, setYear] = useState(() => {
    const current = String(new Date().getFullYear());
    return allYears.includes(current) ? current : (allYears[0] || current);
  });

  const monthly = useMemo(() => {
    // Array of 12 month buckets
    const data = Array.from({ length: 12 }, (_, i) => ({
      month: i + 1,
      name: ['ינואר', 'פברואר', 'מרץ', 'אפריל', 'מאי', 'יוני', 'יולי', 'אוגוסט', 'ספטמבר', 'אוקטובר', 'נובמבר', 'דצמבר'][i],
      invoiced: 0, paid: 0, invoiceCount: 0, receiptCount: 0,
    }));
    for (const inv of invoices) {
      if (!inv.date || !inv.date.startsWith(year + '-')) continue;
      const m = parseInt(inv.date.slice(5, 7)) - 1;
      data[m].invoiced += getInvoiceTotal(inv);
      data[m].invoiceCount += 1;
    }
    for (const r of receipts) {
      if (!r.date || !r.date.startsWith(year + '-')) continue;
      const m = parseInt(r.date.slice(5, 7)) - 1;
      data[m].paid += Number(r.amount) || 0;
      data[m].receiptCount += 1;
    }
    return data;
  }, [invoices, receipts, year, getInvoiceTotal]);

  const yearTotal = {
    invoiced: monthly.reduce((s, m) => s + m.invoiced, 0),
    paid: monthly.reduce((s, m) => s + m.paid, 0),
    invoiceCount: monthly.reduce((s, m) => s + m.invoiceCount, 0),
    receiptCount: monthly.reduce((s, m) => s + m.receiptCount, 0),
  };
  const maxBar = Math.max(1, ...monthly.map(m => Math.max(m.invoiced, m.paid)));

  const exportYearXLSX = () => {
    if (!window.XLSX) { alert('ספריית האקסל לא נטענה'); return; }
    const wb = XLSX.utils.book_new();
    const rows = monthly.map(m => ({
      'חודש': m.name,
      'מס׳ חשבוניות': m.invoiceCount,
      'סה״כ חויב': Number(m.invoiced.toFixed(2)),
      'מס׳ קבלות': m.receiptCount,
      'סה״כ התקבל': Number(m.paid.toFixed(2)),
    }));
    rows.push({
      'חודש': `סה״כ ${year}`,
      'מס׳ חשבוניות': yearTotal.invoiceCount,
      'סה״כ חויב': Number(yearTotal.invoiced.toFixed(2)),
      'מס׳ קבלות': yearTotal.receiptCount,
      'סה״כ התקבל': Number(yearTotal.paid.toFixed(2)),
    });
    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [{ wch: 16 }, { wch: 16 }, { wch: 16 }, { wch: 16 }, { wch: 16 }];
    ws['!views'] = [{ RTL: true }];
    for (let r = 1; r <= rows.length; r++) {
      for (const c of [2, 4]) {
        const addr = XLSX.utils.encode_cell({ r, c });
        if (ws[addr]) ws[addr].z = '#,##0.00\\ "₪"';
      }
    }
    styleAsTable(ws, 5, rows.length);
    XLSX.utils.book_append_sheet(wb, ws, `דוח ${year}`);
    XLSX.writeFile(wb, `דוח-שנתי-${year}.xlsx`);
  };

  const printYearReport = () => {
    const biz = business || DEFAULT_BUSINESS;
    const html = `<!DOCTYPE html><html dir="rtl" lang="he"><head><meta charset="utf-8"><title>דוח שנתי ${year}</title>
      <style>
        @page { size: A4; margin: 15mm; }
        body { font-family: -apple-system, "Segoe UI", Arial, sans-serif; color: #111; direction: rtl; margin: 0; padding: 10px; }
        h1 { font-size: 20px; margin: 0 0 4px; color: #2a4d3a; }
        .sub { font-size: 13px; color: #666; margin-bottom: 18px; }
        .summary { display: flex; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
        .summary-box { flex: 1; min-width: 140px; background: #f6f4ed; padding: 12px 14px; border-radius: 6px; }
        .summary-label { font-size: 12px; color: #666; }
        .summary-value { font-size: 20px; font-weight: 600; color: #2a4d3a; margin-top: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f1efe8; text-align: right; padding: 8px 10px; border: 1px solid #ccc; font-weight: 500; }
        td { padding: 8px 10px; border: 1px solid #ddd; }
        td.num { text-align: left; white-space: nowrap; }

// ============ Client Detail ============
function ClientDetail({ client, invoices, receipts, paidByInvoice, getInvoiceTotal, onClose, onViewInvoice, onViewReceipt }) {
  const clientInvoices = invoices.filter(i => i.clientId === client.id).sort((a, b) => b.number - a.number);
  const clientReceipts = receipts.filter(r => r.clientId === client.id).sort((a, b) => b.number - a.number);
  const totalInvoiced = clientInvoices.reduce((s, i) => s + getInvoiceTotal(i), 0);
  const totalPaid = clientReceipts.reduce((s, r) => s + (Number(r.amount) || 0), 0);
  const outstanding = totalInvoiced - totalPaid;

  return (
    <Modal title={`היסטוריית לקוח — ${client.name}`} onClose={onClose} wide>
      <div className="soft-card" style={{ marginBottom: 14, fontSize: 13, lineHeight: 1.7 }}>
        {client.taxId && <div>ת.ז./ח.פ.: {client.taxId}</div>}
        {client.phone && <div>טלפון: {client.phone}</div>}
        {client.email && <div>דוא״ל: {client.email}</div>}
        {client.address && <div>{client.address}</div>}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 10, marginBottom: '1rem' }}>
        <div className="stat-card"><div className="stat-label">סה״כ חויב</div><div className="stat-value" style={{ fontSize: 18 }}>{fmtILS(totalInvoiced)}</div></div>
        <div className="stat-card"><div className="stat-label">סה״כ שולם</div><div className="stat-value" style={{ fontSize: 18, color: 'var(--success)' }}>{fmtILS(totalPaid)}</div></div>
        <div className="stat-card"><div className="stat-label">יתרה</div><div className="stat-value" style={{ fontSize: 18, color: outstanding > 0.001 ? 'var(--warning)' : 'var(--text)' }}>{fmtILS(outstanding)}</div></div>
      </div>

      <h3 style={{ fontSize: 15, margin: '1rem 0 8px', fontWeight: 500 }}>חשבוניות ({clientInvoices.length})</h3>
      {clientInvoices.length === 0 ? (
        <p style={{ color: 'var(--text-muted)', fontSize: 13 }}>אין חשבוניות</p>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {clientInvoices.map(inv => {
            const t = getInvoiceTotal(inv);
            const p = paidByInvoice[inv.id] || 0;
            const status = p >= t - 0.001 && t > 0 ? 'שולם' : p > 0.001 ? 'חלקי' : 'לא שולם';
            const statusColor = p >= t - 0.001 && t > 0 ? 'var(--success)' : p > 0.001 ? 'var(--warning)' : 'var(--danger)';
            return (
              <div key={inv.id} className="soft-card" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8, cursor: 'pointer' }} onClick={() => onViewInvoice(inv)}>
                <div style={{ fontSize: 13 }}>
                  <span style={{ fontWeight: 500 }}>#{inv.number}</span> • {fmtDate(inv.date)} {inv.subject && `• ${inv.subject}`}
                </div>
                <div style={{ fontSize: 13, textAlign: 'left' }}>
                  <span>{fmtILS(t)}</span>
                  <span style={{ marginRight: 8, color: statusColor, fontSize: 12 }}>{status}</span>
                </div>
              </div>
            );
          })}
        </div>
      )}

      <h3 style={{ fontSize: 15, margin: '1.25rem 0 8px', fontWeight: 500 }}>קבלות ({clientReceipts.length})</h3>
      {clientReceipts.length === 0 ? (
        <p style={{ color: 'var(--text-muted)', fontSize: 13 }}>אין קבלות</p>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {clientReceipts.map(r => (
            <div key={r.id} className="soft-card" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8, cursor: 'pointer' }} onClick={() => onViewReceipt(r)}>
              <div style={{ fontSize: 13 }}>
                <span style={{ fontWeight: 500 }}>#{r.number}</span> • {fmtDate(r.date)} • {methodLabel(r.method)}
                {r.invoiceNumber ? ` • כנגד חשבון #${r.invoiceNumber}` : r.description ? ` • ${r.description}` : ''}
              </div>
              <div style={{ fontSize: 13, fontWeight: 500 }}>{fmtILS(r.amount)}</div>
            </div>
          ))}
        </div>
      )}
    </Modal>
  );
}

// ============ Home ============
function HomeTab({ clients, invoices, receipts, paidByInvoice, getInvoiceTotal, setTab }) {
  const totalInvoiced = invoices.reduce((s, inv) => s + getInvoiceTotal(inv), 0);
  const totalPaid = receipts.reduce((s, r) => s + Number(r.amount || 0), 0);
  const outstanding = totalInvoiced - totalPaid;
  const unpaid = invoices.filter(inv => {
    const total = getInvoiceTotal(inv);
    const paid = paidByInvoice[inv.id] || 0;
    return paid < total - 0.001;
  }).sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);

  return (
    <div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 10, marginBottom: '1.25rem' }}>
        <div className="stat-card"><div className="stat-label">לקוחות</div><div className="stat-value">{clients.length}</div></div>
        <div className="stat-card"><div className="stat-label">חשבוניות</div><div className="stat-value">{invoices.length}</div></div>
        <div className="stat-card"><div className="stat-label">סה״כ חויב</div><div className="stat-value">{fmtILS(totalInvoiced)}</div></div>
        <div className="stat-card"><div className="stat-label">סה״כ שולם</div><div className="stat-value" style={{ color: 'var(--success)' }}>{fmtILS(totalPaid)}</div></div>
        <div className="stat-card"><div className="stat-label">יתרה לגבייה</div><div className="stat-value" style={{ color: outstanding > 0 ? 'var(--warning)' : 'var(--text)' }}>{fmtILS(outstanding)}</div></div>
      </div>

      <h2 style={{ fontSize: 16, margin: '1rem 0 0.75rem' }}>חשבוניות לא שולמו במלואן</h2>
      {unpaid.length === 0 ? (
        <p style={{ color: 'var(--text-muted)', fontSize: 14 }}>כל החשבוניות שולמו ✓</p>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {unpaid.map(inv => {
            const total = getInvoiceTotal(inv);
            const paid = paidByInvoice[inv.id] || 0;
            const remain = total - paid;
            return (
              <div key={inv.id} className="card" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 8 }}>
                <div>
                  <div style={{ fontWeight: 500, fontSize: 14 }}>חשבון עסקה #{inv.number} — {inv.clientName}</div>
                  <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 2 }}>{fmtDate(inv.date)}</div>
                </div>
                <div style={{ textAlign: 'left', fontSize: 13 }}>
                  <div>סה״כ: {fmtILS(total)}</div>
                  <div style={{ color: 'var(--warning)' }}>יתרה: {fmtILS(remain)}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function SettingsTab({ business, setBusiness, counters, setCounters, clients, items, invoices, receipts, setClients, setItems, setInvoices, setReceipts, lastBackup }) {
  const [b, setB] = useState(business);
  const [c, setC] = useState(counters);
  const [saved, setSaved] = useState(false);

  useEffect(() => { setB(business); }, [business]);
  useEffect(() => { setC(counters); }, [counters]);

  const upd = (k, v) => setB({ ...b, [k]: v });
  const updC = (k, v) => setC({ ...c, [k]: v });

  const save = () => {
    setBusiness(b);
    const nextInv = Math.max(1, parseInt(c.invoice) || 1);
    const nextRec = Math.max(1, parseInt(c.receipt) || 1);
    setCounters({ invoice: nextInv, receipt: nextRec });
    setSaved(true);
    setTimeout(() => setSaved(false), 2500);
  };

  const resetAll = () => {
    if (!confirm('לאפס את כל הנתונים? פעולה זו לא ניתנת לביטול. (מומלץ לייצא גיבוי קודם.)')) return;
    if (!confirm('באמת למחוק הכל?')) return;
    setClients([]); setItems([]); setInvoices([]); setReceipts([]);
    setBusiness(DEFAULT_BUSINESS);
    setCounters({ invoice: 1000, receipt: 2000 });

    <div>
      <section className="card" style={{ marginBottom: 16 }}>
        <h2 style={{ fontSize: 16, marginBottom: 12 }}>פרטי העסק</h2>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))', gap: 12 }}>
          <div><label>שם העסק</label><input value={b.name || ''} onChange={e => upd('name', e.target.value)} /></div>
          <div><label>תת כותרת / תחום</label><input value={b.subtitle || ''} onChange={e => upd('subtitle', e.target.value)} /></div>
          <div><label>כתובת</label><input value={b.address || ''} onChange={e => upd('address', e.target.value)} /></div>
          <div><label>סוג עוסק</label>
            <select value={b.taxType || 'עוסק פטור'} onChange={e => upd('taxType', e.target.value)}>
              <option value="עוסק פטור">עוסק פטור</option>
              <option value="עוסק מורשה">עוסק מורשה</option>
              <option value="עוסק זעיר">עוסק זעיר</option>
              <option value="חברה בע״מ">חברה בע״מ</option>
            </select>
          </div>
          <div><label>מס׳ עוסק / ח.פ.</label><input value={b.taxId || ''} onChange={e => upd('taxId', e.target.value)} /></div>
          <div><label>טלפון</label><input value={b.phone || ''} onChange={e => upd('phone', e.target.value)} /></div>
          <div><label>דוא״ל</label><input type="email" value={b.email || ''} onChange={e => upd('email', e.target.value)} /></div>
          <div style={{ gridColumn: '1 / -1' }}><label>הערת תחתית למסמך</label><input value={b.footerNote || ''} onChange={e => upd('footerNote', e.target.value)} placeholder="מסמך זה אינו מהווה חשבונית מס" /></div>
        </div>
      </section>

      <section className="card" style={{ marginBottom: 16 }}>
        <h2 style={{ fontSize: 16, marginBottom: 12 }}>מספור מסמכים</h2>
        <p style={{ fontSize: 13, color: 'var(--text-muted)', margin: '-8px 0 16px' }}>המספר הבא שיונפק. ניתן לעדכן למשל אם הגעת עם מספור ממקום אחר.</p>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 12 }}>
          <div>
            <label>מספר חשבון עסקה הבא</label>

          window.location.reload();
        }}>ניתוק וחיבור מחדש</button>
      </section>

      <section className="card" style={{ marginBottom: 16 }}>
        <h2 style={{ fontSize: 16, marginBottom: 8 }}>מצב גיבוי</h2>
        <p style={{ fontSize: 13, color: 'var(--text-muted)', margin: 0 }}>
          {lastBackup
            ? `הגיבוי האחרון בוצע ב-${fmtDate(lastBackup.slice(0, 10))}.`
            : 'טרם בוצע גיבוי מקומי.'}
          {' '}בנוסף לגיבוי הענן (גיליון Google), מומלץ להוריד מעת לעת גיבוי JSON לשמירה במקום נוסף.
        </p>
      </section>

      <section className="card" style={{ borderColor: 'var(--danger)' }}>
        <h2 style={{ fontSize: 16, marginBottom: 8, color: 'var(--danger)' }}>אזור מסוכן</h2>
        <p style={{ fontSize: 13, color: 'var(--text-muted)', marginBottom: 12 }}>איפוס מלא של כל הנתונים. יש לייצא גיבוי קודם.</p>
        <button className="danger-btn" onClick={resetAll}><IconTrash size={14} /> מחיקת כל הנתונים</button>
      </section>
    </div>
  );
}

// ============ Clients ============
function ClientsTab({ clients, setClients, invoices, receipts, paidByInvoice, getInvoiceTotal, business }) {
  const [search, setSearch] = useState('');
  const [editing, setEditing] = useState(null);
  const [viewingHistory, setViewingHistory] = useState(null);
  const [viewingInvoice, setViewingInvoice] = useState(null);
  const [viewingReceipt, setViewingReceipt] = useState(null);

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    if (!q) return clients;
    return clients.filter(c =>
      (c.name || '').toLowerCase().includes(q) ||
      (c.taxId || '').includes(q) ||
      (c.email || '').toLowerCase().includes(q) ||
      (c.phone || '').includes(q)
    );
  }, [clients, search]);

  const save = (data) => {
    if (!data.name || !data.name.trim()) { alert('חובה להזין שם'); return; }
    if (data.id && clients.find(c => c.id === data.id)) {
      setClients(clients.map(c => c.id === data.id ? data : c));
    } else {
      setClients([...clients, { ...data, id: uid() }]);
    }
    setEditing(null);
  };

  const remove = (id) => {
    const hasInvoices = invoices.some(inv => inv.clientId === id);
    if (hasInvoices) {
      if (!confirm('ללקוח זה קיימות חשבוניות. האם להמשיך במחיקה?')) return;
    } else {
      if (!confirm('למחוק לקוח זה?')) return;
    }
    setClients(clients.filter(c => c.id !== id));
  };

  const countFor = (id) => ({
    inv: invoices.filter(i => i.clientId === id).length,
    rec: receipts.filter(r => r.clientId === id).length,
  });

  return (
    <div>
      <div style={{ display: 'flex', gap: 8, marginBottom: '1rem', flexWrap: 'wrap' }}>
        <div style={{ flex: 1, minWidth: 200, position: 'relative' }}>
          <span style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', color: 'var(--text-faint)' }}><IconSearch size={14} /></span>

      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {filtered.map(c => {
            const cnt = countFor(c.id);
            return (
              <div key={c.id} className="card">

                      {c.phone && <span>טלפון: {c.phone}</span>}
                      {c.email && <span>דוא״ל: {c.email}</span>}

                      <div style={{ fontSize: 12, color: 'var(--text-faint)', marginTop: 4 }}>

                      </div>
                    )}
                  </div>
                  <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                    <button onClick={() => setViewingHistory(c)} style={{ fontSize: 12, padding: '6px 10px' }}><IconHistory size={13} /> היסטוריה</button>
                    <button className="icon-btn" onClick={() => setEditing(c)}><IconEdit size={13} /></button>
                    <button className="icon-btn" onClick={() => remove(c.id)}><IconTrash size={13} /></button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {editing && <ClientForm data={editing} onSave={save} onCancel={() => setEditing(null)} />}
      {viewingHistory && (
        <ClientDetail
          client={viewingHistory}
          invoices={invoices}
          receipts={receipts}
          paidByInvoice={paidByInvoice}
          getInvoiceTotal={getInvoiceTotal}
          onClose={() => setViewingHistory(null)}
          onViewInvoice={(inv) => setViewingInvoice(inv)}
          onViewReceipt={(r) => setViewingReceipt(r)}
        />
      )}
      {viewingInvoice && <InvoiceView invoice={viewingInvoice} onClose={() => setViewingInvoice(null)} paidByInvoice={paidByInvoice} getInvoiceTotal={getInvoiceTotal} business={business} />}
      {viewingReceipt && <ReceiptView receipt={viewingReceipt} onClose={() => setViewingReceipt(null)} business={business} />}
    </div>
  );
}

// ============ Invoices ============
function InvoicesTab({ invoices, setInvoices, clients, items, receipts, paidByInvoice, getInvoiceTotal, counters, setCounters, business }) {
  const [search, setSearch] = useState('');
  const [editing, setEditing] = useState(null);
  const [viewing, setViewing] = useState(null);
  const [filter, setFilter] = useState('all');
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    return invoices
      .filter(inv => {
        const total = getInvoiceTotal(inv);
        const paid = paidByInvoice[inv.id] || 0;
        if (filter === 'paid' && paid < total - 0.001) return false;
        if (filter === 'unpaid' && paid > 0.001) return false;
        if (filter === 'partial' && (paid <= 0.001 || paid >= total - 0.001)) return false;
        if (dateFrom && (!inv.date || inv.date < dateFrom)) return false;
        if (dateTo && (!inv.date || inv.date > dateTo)) return false;
        if (!q) return true;
        return (inv.clientName || '').toLowerCase().includes(q) ||
               String(inv.number).includes(q) ||
               (inv.subject || '').toLowerCase().includes(q);
      })
      .sort((a, b) => b.number - a.number);
  }, [invoices, search, filter, paidByInvoice, getInvoiceTotal, dateFrom, dateTo]);

  const save = (data) => {
    if (!data.clientId) { alert('יש לבחור לקוח'); return; }
    if (!data.lines || data.lines.length === 0) { alert('יש להוסיף לפחות שורה אחת'); return; }
    if (!data.lines.some(l => l.description && l.description.trim())) { alert('יש להזין תיאור בשורות'); return; }
    if (data.id && invoices.find(i => i.id === data.id)) {
      setInvoices(invoices.map(i => i.id === data.id ? data : i));
    } else {
      const number = counters.invoice;
      setCounters({ ...counters, invoice: number + 1 });
      setInvoices([...invoices, { ...data, id: uid(), number }]);
    }
    setEditing(null);
  };

  const remove = (id) => {
    const linked = receipts.filter(r => r.invoiceId === id);
    if (linked.length > 0) { alert(`לא ניתן למחוק — קיימות ${linked.length} קבלות מקושרות.`); return; }
    if (!confirm('למחוק חשבון עסקה זה?')) return;
    setInvoices(invoices.filter(i => i.id !== id));
  };

  const duplicate = (inv) => {
    // Copy everything except id, number, date (use today), and regenerate line ids
    const copy = {
      ...inv,
      date: todayISO(),
      lines: (inv.lines || []).map(l => ({ ...l, id: uid() })),
    };
    delete copy.id;
    delete copy.number;
    setEditing(copy);
  };

  const blankInvoice = () => ({
    date: todayISO(), clientId: '', clientName: '', clientDetails: {}, subject: '',
    lines: [{ id: uid(), itemId: '', code: '', description: '', qty: 1, price: 0 }],
    notes: '',
  });

  return (
    <div>
      <div style={{ display: 'flex', gap: 8, marginBottom: '0.5rem', flexWrap: 'wrap' }}>
        <div style={{ flex: 1, minWidth: 180, position: 'relative' }}>
          <span style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', color: 'var(--text-faint)' }}><IconSearch size={14} /></span>
          <input placeholder="חיפוש..." value={search} onChange={(e) => setSearch(e.target.value)} style={{ paddingRight: 32 }} />
        </div>
        <select value={filter} onChange={(e) => setFilter(e.target.value)} style={{ width: 'auto' }}>
          <option value="all">הכל</option>
          <option value="unpaid">לא שולם</option>
          <option value="partial">שולם חלקית</option>
          <option value="paid">שולם במלואו</option>
        </select>
        <button className="primary" onClick={() => {
          if (clients.length === 0) { alert('יש להוסיף לקוח לפני יצירת חשבון עסקה'); return; }
          setEditing(blankInvoice());
        }}><IconPlus size={14} /> חשבון חדש</button>
        <button onClick={() => {
          if (filtered.length === 0) { alert('אין חשבוניות להדפסה'); return; }
          printInvoicesList(filtered, paidByInvoice, getInvoiceTotal, business);
        }} title="הדפסת הרשימה"><IconPrint size={14} /> הדפסה</button>
        <button onClick={() => {
          if (filtered.length === 0) { alert('אין חשבוניות לייצוא'); return; }
          exportInvoicesXLSX(filtered, paidByInvoice, getInvoiceTotal);
        }} title="ייצוא לאקסל"><IconDownload size={14} /> אקסל</button>
      </div>

      <div style={{ display: 'flex', gap: 8, marginBottom: '1rem', flexWrap: 'wrap', alignItems: 'center', fontSize: 13 }}>
        <span style={{ color: 'var(--text-muted)' }}>טווח תאריכים:</span>
        <div style={{ width: 130 }}><DateInput value={dateFrom} onChange={setDateFrom} /></div>
        <span style={{ color: 'var(--text-muted)' }}>עד</span>
        <div style={{ width: 130 }}><DateInput value={dateTo} onChange={setDateTo} /></div>
        {(dateFrom || dateTo) && (
          <button onClick={() => { setDateFrom(''); setDateTo(''); }} style={{ fontSize: 12, padding: '4px 10px' }}>נקה</button>
        )}
        <span style={{ color: 'var(--text-faint)', marginRight: 'auto' }}>מציג {filtered.length} מתוך {invoices.length}</span>
      </div>

      {filtered.length === 0 ? (
        <p style={{ color: 'var(--text-muted)', fontSize: 14, textAlign: 'center', padding: '2rem' }}>אין חשבוניות להצגה</p>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {filtered.map(inv => {
            const total = getInvoiceTotal(inv);
            const paid = paidByInvoice[inv.id] || 0;
            const remain = total - paid;
            const status = paid >= total - 0.001 && total > 0 ? 'paid' : paid > 0.001 ? 'partial' : 'unpaid';
            const statusStyles = {
              paid: { bg: 'var(--success-bg)', fg: 'var(--success)', label: 'שולם' },
              partial: { bg: 'var(--warning-bg)', fg: 'var(--warning)', label: 'חלקי' },
              unpaid: { bg: 'var(--danger-bg)', fg: 'var(--danger)', label: 'לא שולם' },
            }[status];
            return (
              <div key={inv.id} className="card">
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12, flexWrap: 'wrap' }}>
                  <div style={{ flex: 1, minWidth: 180 }}>
                    <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
                      <span style={{ fontWeight: 500, fontSize: 15 }}>#{inv.number} — {inv.clientName}</span>
                      <span className="badge" style={{ background: statusStyles.bg, color: statusStyles.fg }}>{statusStyles.label}</span>
                    </div>
                    <div style={{ fontSize: 13, color: 'var(--text-muted)', marginTop: 4 }}>
                      {fmtDate(inv.date)}{inv.subject && ` • ${inv.subject}`}
                    </div>
                  </div>
                  <div style={{ textAlign: 'left', fontSize: 13 }}>
                    <div style={{ fontWeight: 500 }}>{fmtILS(total)}</div>
                    {paid > 0 && <div style={{ color: 'var(--success)', fontSize: 12 }}>שולם: {fmtILS(paid)}</div>}
                    {remain > 0.001 && <div style={{ color: 'var(--warning)', fontSize: 12 }}>יתרה: {fmtILS(remain)}</div>}
                  </div>
                </div>
                <div style={{ display: 'flex', gap: 4, marginTop: 10, flexWrap: 'wrap' }}>
                  <button onClick={() => setViewing(inv)} style={{ fontSize: 12, padding: '4px 10px' }}><IconPrint size={12} /> צפייה / הדפסה</button>
                  <button onClick={() => setEditing(inv)} style={{ fontSize: 12, padding: '4px 10px' }}><IconEdit size={12} /> עריכה</button>
                  <button onClick={() => duplicate(inv)} style={{ fontSize: 12, padding: '4px 10px' }}><IconCopy size={12} /> שכפול</button>
                  <button onClick={() => remove(inv.id)} style={{ fontSize: 12, padding: '4px 10px' }}><IconTrash size={12} /> מחק</button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {editing && <InvoiceForm data={editing} onSave={save} onCancel={() => setEditing(null)} clients={clients} items={items} />}
      {viewing && <InvoiceView invoice={viewing} onClose={() => setViewing(null)} paidByInvoice={paidByInvoice} getInvoiceTotal={getInvoiceTotal} business={business} />}
    </div>
  );
}

function InvoiceForm({ data, onSave, onCancel, clients, items }) {
  const [f, setF] = useState(data);
  const upd = (k, v) => setF({ ...f, [k]: v });

  const updLine = (idx, k, v) => {
    const newLines = [...f.lines];
    newLines[idx] = { ...newLines[idx], [k]: v };
    setF({ ...f, lines: newLines });
  };

  const selectItem = (idx, itemId) => {
    if (!itemId) { updLine(idx, 'itemId', ''); return; }
    const it = items.find(i => i.id === itemId);
    if (it) {
      const newLines = [...f.lines];
      newLines[idx] = { ...newLines[idx], itemId, code: it.code || '', description: it.description, price: it.price };
      setF({ ...f, lines: newLines });
    }
  };

  const addLine = () => setF({ ...f, lines: [...f.lines, { id: uid(), itemId: '', code: '', description: '', qty: 1, price: 0 }] });
  const removeLine = (idx) => { if (f.lines.length <= 1) return; setF({ ...f, lines: f.lines.filter((_, i) => i !== idx) }); };

  const selectClient = (cid) => {
    const c = clients.find(x => x.id === cid);
    if (c) setF({ ...f, clientId: cid, clientName: c.name, clientDetails: { taxId: c.taxId, address: c.address, email: c.email, phone: c.phone } });
  };

  const total = (f.lines || []).reduce((s, l) => s + (Number(l.qty) || 0) * (Number(l.price) || 0), 0);

  return (
    <Modal title={data.id ? `עריכת חשבון עסקה #${data.number}` : 'חשבון עסקה חדש'} onClose={onCancel} wide>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 12 }}>
        <Field label="תאריך"><DateInput value={f.date || ''} onChange={(v) => upd('date', v)} /></Field>
        <Field label="לקוח *">
          <select value={f.clientId || ''} onChange={(e) => selectClient(e.target.value)}>
            <option value="">— בחר —</option>
            {clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </Field>
      </div>
      <Field label="נושא"><input value={f.subject || ''} onChange={(e) => upd('subject', e.target.value)} placeholder="לדוגמה: מפגשי טיפול ינואר" /></Field>

      <div style={{ marginTop: 14 }}>
        <div style={{ fontSize: 14, fontWeight: 500, marginBottom: 8 }}>שורות</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {f.lines.map((ln, idx) => (
            <div key={ln.id} className="soft-card">
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'end', marginBottom: 8 }}>
                <div style={{ flex: 1, minWidth: 140 }}>
                  <label style={{ fontSize: 12 }}>בחירה מקטלוג (אופציונלי)</label>
                  <select value={ln.itemId || ''} onChange={(e) => selectItem(idx, e.target.value)}>
                    <option value="">— טקסט חופשי —</option>
                    {items.map(i => <option key={i.id} value={i.id}>{i.description} ({fmtILS(i.price)})</option>)}
                  </select>
                </div>
                <button className="icon-btn" onClick={() => removeLine(idx)} disabled={f.lines.length <= 1}><IconTrash size={13} /></button>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '70px 1fr 70px 100px 100px', gap: 8, alignItems: 'end' }}>
                <div><label style={{ fontSize: 12 }}>קוד</label><input value={ln.code || ''} onChange={(e) => updLine(idx, 'code', e.target.value)} /></div>
                <div><label style={{ fontSize: 12 }}>תיאור</label><input value={ln.description || ''} onChange={(e) => updLine(idx, 'description', e.target.value)} /></div>
                <div><label style={{ fontSize: 12 }}>כמות</label><input type="number" step="0.5" value={ln.qty || ''} onChange={(e) => updLine(idx, 'qty', e.target.value)} /></div>
                <div><label style={{ fontSize: 12 }}>מחיר יח׳</label><input type="number" step="0.01" value={ln.price || ''} onChange={(e) => updLine(idx, 'price', e.target.value)} /></div>
                <div style={{ fontSize: 13, fontWeight: 500, textAlign: 'left', padding: '8px 0' }}>{fmtILS((Number(ln.qty) || 0) * (Number(ln.price) || 0))}</div>
              </div>
            </div>
          ))}
        </div>
        <button onClick={addLine} style={{ marginTop: 8, fontSize: 13 }}><IconPlus size={13} /> הוסף שורה</button>
      </div>

      <div className="soft-card" style={{ marginTop: 14, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span style={{ fontSize: 14, fontWeight: 500 }}>סה״כ לתשלום</span>
        <span style={{ fontSize: 20, fontWeight: 500 }}>{fmtILS(total)}</span>
      </div>

      <Field label="הערות"><textarea value={f.notes || ''} onChange={(e) => upd('notes', e.target.value)} rows={2} /></Field>

      <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
        <button className="primary" onClick={() => onSave(f)}><IconCheck size={14} /> שמירה</button>
        <button onClick={onCancel}>ביטול</button>
      </div>
    </Modal>
  );
}

// ============ Receipts ============
function ReceiptsTab({ receipts, setReceipts, invoices, clients, counters, setCounters, getInvoiceTotal, paidByInvoice, business }) {
  const [editing, setEditing] = useState(null);
  const [viewing, setViewing] = useState(null);
  const [search, setSearch] = useState('');
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    return receipts
      .filter(r => {
        if (dateFrom && (!r.date || r.date < dateFrom)) return false;
        if (dateTo && (!r.date || r.date > dateTo)) return false;
        if (!q) return true;
        return (r.clientName || '').toLowerCase().includes(q) ||
               String(r.number).includes(q) ||
               String(r.invoiceNumber || '').includes(q) ||
               (r.description || '').toLowerCase().includes(q);
      })
      .sort((a, b) => b.number - a.number);
  }, [receipts, search, dateFrom, dateTo]);

  const save = (data) => {
    // Either linked to an invoice OR has a client selected for a standalone receipt
    if (!data.invoiceId && !data.clientId) { alert('יש לבחור חשבון עסקה או לקוח'); return; }
    const amt = Number(data.amount);
    if (!amt || amt <= 0) { alert('יש להזין סכום תקין'); return; }
    // Standalone receipts need a description
    if (!data.invoiceId && (!data.description || !data.description.trim())) { alert('יש להזין תיאור שירות/פריט לקבלה עצמאית'); return; }
    const clean = { ...data, amount: amt };
    if (clean.id && receipts.find(r => r.id === clean.id)) {
      setReceipts(receipts.map(r => r.id === clean.id ? clean : r));
    } else {
      const number = counters.receipt;
      setCounters({ ...counters, receipt: number + 1 });
      setReceipts([...receipts, { ...clean, id: uid(), number }]);
    }
    setEditing(null);
  };

  const remove = (id) => {
    if (!confirm('למחוק קבלה זו?')) return;
    setReceipts(receipts.filter(r => r.id !== id));
  };

  const blankReceipt = () => ({
    date: todayISO(), invoiceId: '', invoiceNumber: '', clientId: '', clientName: '',
    clientDetails: {}, amount: 0, method: 'cash', notes: '', description: '',
  });

  return (
    <div>
      <div style={{ display: 'flex', gap: 8, marginBottom: '0.5rem', flexWrap: 'wrap' }}>
        <div style={{ flex: 1, minWidth: 180, position: 'relative' }}>

        <button className="primary" onClick={() => {
          if (clients.length === 0) { alert('יש להוסיף לקוח לפני הוצאת קבלה'); return; }
          setEditing(blankReceipt());
        }}><IconPlus size={14} /> קבלה חדשה</button>
        <button onClick={() => {
          if (filtered.length === 0) { alert('אין קבלות להדפסה'); return; }
          printReceiptsList(filtered, business);
        }} title="הדפסת הרשימה"><IconPrint size={14} /> הדפסה</button>
        <button onClick={() => {
          if (filtered.length === 0) { alert('אין קבלות לייצוא'); return; }
          exportReceiptsXLSX(filtered);
        }} title="ייצוא לאקסל"><IconDownload size={14} /> אקסל</button>
      </div>

      <div style={{ display: 'flex', gap: 8, marginBottom: '1rem', flexWrap: 'wrap', alignItems: 'center', fontSize: 13 }}>
        <span style={{ color: 'var(--text-muted)' }}>טווח תאריכים:</span>
        <div style={{ width: 130 }}><DateInput value={dateFrom} onChange={setDateFrom} /></div>
        <span style={{ color: 'var(--text-muted)' }}>עד</span>
        <div style={{ width: 130 }}><DateInput value={dateTo} onChange={setDateTo} /></div>
        {(dateFrom || dateTo) && (
          <button onClick={() => { setDateFrom(''); setDateTo(''); }} style={{ fontSize: 12, padding: '4px 10px' }}>נקה</button>
        )}
        <span style={{ color: 'var(--text-faint)', marginRight: 'auto' }}>מציג {filtered.length} מתוך {receipts.length}</span>
      </div>

      {filtered.length === 0 ? (
        <p style={{ color: 'var(--text-muted)', fontSize: 14, textAlign: 'center', padding: '2rem' }}>אין קבלות להצגה</p>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>

                <div style={{ flex: 1, minWidth: 180 }}>
                  <div style={{ fontWeight: 500, fontSize: 15 }}>קבלה #{r.number} — {r.clientName}</div>
                  <div style={{ fontSize: 13, color: 'var(--text-muted)', marginTop: 4 }}>
                    {fmtDate(r.date)} • {r.invoiceNumber ? `כנגד חשבון עסקה #${r.invoiceNumber}` : (r.description || 'קבלה עצמאית')} • {methodLabel(r.method)}

function ReceiptForm({ data, onSave, onCancel, invoices, clients, getInvoiceTotal, paidByInvoice }) {
  const [f, setF] = useState(data);
  // Mode: 'linked' (connected to an invoice) or 'standalone' (no invoice)
  const [mode, setMode] = useState(data.invoiceId ? 'linked' : (data.id ? 'standalone' : 'linked'));
  const upd = (k, v) => setF({ ...f, [k]: v });

  const selectInvoice = (invId) => {
    if (!invId) {
      setF({ ...f, invoiceId: '', invoiceNumber: '', clientId: '', clientName: '', clientDetails: {} });
      return;
    }
    const inv = invoices.find(i => i.id === invId);
    if (inv) {
      const total = getInvoiceTotal(inv);
      const paidExcl = (paidByInvoice[inv.id] || 0) - (f.id && f.invoiceId === invId ? Number(data.amount) || 0 : 0);
      const remain = Math.max(0, total - paidExcl);
      setF({
        ...f, invoiceId: invId, invoiceNumber: inv.number,
        clientId: inv.clientId, clientName: inv.clientName, clientDetails: inv.clientDetails,
        amount: f.id ? f.amount : remain,
      });
    }
  };

  const selectClient = (cid) => {
    if (!cid) {
      setF({ ...f, clientId: '', clientName: '', clientDetails: {} });
      return;
    }
    const c = clients.find(x => x.id === cid);
    if (c) {
      setF({
        ...f, clientId: cid, clientName: c.name,
        clientDetails: { taxId: c.taxId, address: c.address, email: c.email, phone: c.phone },
      });
    }
  };

  const switchMode = (newMode) => {
    if (newMode === mode) return;
    // Clear invoice link when switching to standalone
    if (newMode === 'standalone') {
      setF({ ...f, invoiceId: '', invoiceNumber: '' });
    } else {
      // Clear description when switching to linked
      setF({ ...f, description: '' });
    }
    setMode(newMode);
  };

  const selectedInv = invoices.find(i => i.id === f.invoiceId);
  const selectedTotal = selectedInv ? getInvoiceTotal(selectedInv) : 0;
  const selectedPaidExcl = selectedInv ? (paidByInvoice[selectedInv.id] || 0) - (f.id && f.invoiceId === selectedInv.id ? Number(data.amount) || 0 : 0) : 0;
  const selectedRemain = selectedTotal - selectedPaidExcl;

  const unpaidInvoices = invoices.filter(inv => {
    const total = getInvoiceTotal(inv);
    const paid = paidByInvoice[inv.id] || 0;
    return paid < total - 0.001 || inv.id === f.invoiceId;
  }).sort((a, b) => b.number - a.number);

  const modeBtnStyle = (isActive) => ({
    flex: 1,
    padding: '10px 12px',
    border: isActive ? '2px solid var(--primary)' : '0.5px solid var(--border-strong)',
    background: isActive ? 'var(--primary-light)' : 'var(--surface)',
    color: isActive ? 'var(--primary-text)' : 'var(--text)',
    fontWeight: isActive ? 500 : 400,
    borderRadius: 'var(--radius)',
    cursor: 'pointer',
    fontSize: 13,
  });

  return (
    <Modal title={data.id ? `עריכת קבלה #${data.number}` : 'קבלה חדשה'} onClose={onCancel}>
      <div style={{ display: 'flex', gap: 8, marginBottom: 14 }}>
        <button type="button" onClick={() => switchMode('linked')} style={modeBtnStyle(mode === 'linked')}>
          כנגד חשבון עסקה
        </button>
        <button type="button" onClick={() => switchMode('standalone')} style={modeBtnStyle(mode === 'standalone')}>
          קבלה עצמאית
        </button>
      </div>

      {mode === 'linked' ? (
        <>
          <Field label="חשבון עסקה מקושר *">
            <select value={f.invoiceId || ''} onChange={(e) => selectInvoice(e.target.value)}>
              <option value="">— בחר —</option>
              {unpaidInvoices.map(inv => {
                const total = getInvoiceTotal(inv);
                const paid = paidByInvoice[inv.id] || 0;
                const remain = total - paid;
                return <option key={inv.id} value={inv.id}>#{inv.number} — {inv.clientName} ({fmtDate(inv.date)}) — יתרה: {fmtILS(remain)}</option>;
              })}
            </select>
            {unpaidInvoices.length === 0 && (
              <div style={{ fontSize: 12, color: 'var(--text-faint)', marginTop: 4 }}>אין חשבוניות פתוחות. ניתן ליצור קבלה עצמאית.</div>
            )}
          </Field>

          {selectedInv && (
            <div style={{ background: 'var(--info-bg)', color: 'var(--info-text)', padding: '10px 12px', borderRadius: 'var(--radius)', fontSize: 13, marginBottom: 12, lineHeight: 1.7 }}>
              <div>סה״כ חשבון: {fmtILS(selectedTotal)}</div>
              <div>שולם עד כה: {fmtILS(selectedPaidExcl)}</div>
              <div style={{ fontWeight: 500 }}>יתרה: {fmtILS(selectedRemain)}</div>
            </div>
          )}
        </>
      ) : (
        <>
          <Field label="לקוח *">
            <select value={f.clientId || ''} onChange={(e) => selectClient(e.target.value)}>
              <option value="">— בחר —</option>
              {clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </Field>
          <Field label="תיאור שירות / פריט *">
            <input value={f.description || ''} onChange={(e) => upd('description', e.target.value)} placeholder="לדוגמה: מפגש טיפולי" />
          </Field>
        </>
      )}

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: 12 }}>
        <Field label="תאריך"><DateInput value={f.date || ''} onChange={(v) => upd('date', v)} /></Field>
        <Field label="סכום (₪) *"><input type="number" step="0.01" value={f.amount || ''} onChange={(e) => upd('amount', e.target.value)} /></Field>
        <Field label="אמצעי תשלום">
          <select value={f.method || 'cash'} onChange={(e) => upd('method', e.target.value)}>
            <option value="cash">מזומן</option><option value="check">שיק</option>
            <option value="transfer">העברה בנקאית</option><option value="credit">אשראי</option>
            <option value="bit">ביט</option><option value="paybox">פייבוקס</option><option value="other">אחר</option>
          </select>
        </Field>
      </div>
      <Field label="הערות"><input value={f.notes || ''} onChange={(e) => upd('notes', e.target.value)} placeholder="מס׳ שיק, אסמכתא וכד׳" /></Field>

      <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
        <button className="primary" onClick={() => onSave(f)}><IconCheck size={14} /> שמירה</button>
        <button onClick={onCancel}>ביטול</button>
      </div>
    </Modal>
  );
}

function EmailDialog({ type, doc, business, docEl, onClose }) {
  const biz = business || DEFAULT_BUSINESS;
  const isInvoice = type === 'invoice';
  const defaultTo = (doc.clientDetails && doc.clientDetails.email) || '';
  const defaultSubject = isInvoice
    ? `חשבון עסקה מס׳ ${doc.number} מ-${biz.name}`
    : `קבלה מס׳ ${doc.number} מ-${biz.name}`;
  const defaultBody = isInvoice
    ? `שלום ${doc.clientName || ''},\n\nמצורף חשבון עסקה מס׳ ${doc.number} בתאריך ${isoToDMY(doc.date)}.${doc.subject ? `\nנושא: ${doc.subject}` : ''}\n\nנא לאשר קבלת החשבון ולהעביר את התשלום בהקדם.\nלכל שאלה אני זמינה.\n\nתודה,\n${biz.name}\n${biz.phone || ''}${biz.email ? '\n' + biz.email : ''}`
    : `שלום ${doc.clientName || ''},\n\nמצורפת קבלה מס׳ ${doc.number} בתאריך ${isoToDMY(doc.date)} על סך ${fmtILS(doc.amount)}.\nתודה על התשלום!\n\nבברכה,\n${biz.name}\n${biz.phone || ''}${biz.email ? '\n' + biz.email : ''}`;

  const [to, setTo] = useState(defaultTo);
  const [subject, setSubject] = useState(defaultSubject);
  const [body, setBody] = useState(defaultBody);
  const [status, setStatus] = useState('idle'); // idle | building | sending | sent | error
  const [error, setError] = useState('');

  const send = async () => {
    if (!to.trim()) { setError('יש להזין כתובת דוא״ל'); return; }
    setError('');
    try {
      setStatus('building');
      const filename = isInvoice ? `חשבון-${doc.number}.pdf` : `קבלה-${doc.number}.pdf`;
      const pdfBase64 = await renderPdfBase64(docEl, filename);
      setStatus('sending');
      await sendEmailViaBackend({
        to: to.trim(),
        subject: subject.trim(),
        body: body,
        pdfBase64,
        pdfName: filename,
        fromName: biz.name,
      });
      setStatus('sent');
      setTimeout(onClose, 1500);
    } catch (err) {
      console.error(err);
      setStatus('error');
      setError(String(err.message || err));
    }
  };

  const busy = status === 'building' || status === 'sending';

  return (
    <Modal title={`שליחה בדוא״ל — ${isInvoice ? 'חשבון עסקה' : 'קבלה'} #${doc.number}`} onClose={busy ? null : onClose}>
      <Field label="אל *">
        <input type="email" value={to} onChange={(e) => setTo(e.target.value)} dir="ltr" />
      </Field>
      <Field label="נושא">
        <input value={subject} onChange={(e) => setSubject(e.target.value)} />
      </Field>
      <Field label="הודעה">
        <textarea
          value={body}
          onChange={(e) => setBody(e.target.value)}
          rows={10}
          style={{ width: '100%', fontFamily: 'inherit', fontSize: 13, padding: 8, border: '0.5px solid var(--border-strong)', borderRadius: 'var(--radius)', resize: 'vertical' }}
        />
      </Field>

      <div style={{ background: 'var(--info-bg)', color: 'var(--info-text)', padding: '8px 12px', borderRadius: 'var(--radius)', fontSize: 12, marginBottom: 12 }}>
        📎 המערכת תיצור את המסמך כ-PDF ותצרף אותו אוטומטית
      </div>

      {status === 'sent' && (
        <div style={{ background: 'var(--success-bg)', color: 'var(--success)', padding: '10px 12px', borderRadius: 'var(--radius)', fontSize: 13, marginBottom: 12 }}>
          ✓ ההודעה נשלחה בהצלחה ל-{to}
        </div>
      )}
      {error && (
        <div style={{ background: 'var(--danger-bg)', color: 'var(--danger)', padding: '10px 12px', borderRadius: 'var(--radius)', fontSize: 13, marginBottom: 12 }}>
          {error}
        </div>
      )}

      <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
        <button className="primary" onClick={send} disabled={busy || status === 'sent'}>
          <IconMail size={14} />
          {status === 'building' ? 'מכין PDF...' : status === 'sending' ? 'שולח...' : status === 'sent' ? 'נשלח ✓' : 'שליחה'}
        </button>
        <button onClick={onClose} disabled={busy}>ביטול</button>
      </div>
    </Modal>
  );
}

// Generate a PDF from a DOM element and return base64 string (no data: prefix)
async function renderPdfBase64(element, filename) {
  if (!window.html2pdf) throw new Error('ספריית PDF לא נטענה. בדקי חיבור לאינטרנט.');

  // Create a wrapper that's in normal document flow but positioned offscreen.
  // Using position:absolute (not fixed) and putting it far off-screen while
  // preserving layout. Visibility/opacity keep it invisible to the user.
  const wrapper = document.createElement('div');
  wrapper.style.cssText = [
    'position: absolute',
    'top: 0',
    'left: -20000px',
    'width: 800px',
    'background: #ffffff',
    'z-index: -1',
    'pointer-events: none',
  ].join('; ');
  wrapper.setAttribute('dir', 'rtl');
  document.body.appendChild(wrapper);

  const root = ReactDOM.createRoot(wrapper);
  root.render(element);

  // Wait for React commit + browser paint + web fonts
  await new Promise(res => setTimeout(res, 100));
  // Wait for fonts specifically (Hebrew fonts matter here)
  if (document.fonts && document.fonts.ready) {
    try { await document.fonts.ready; } catch (_) {}
  }
  // Extra wait to be safe (images, async rendering)
  await new Promise(res => setTimeout(res, 800));

  // Verify the content actually rendered
  if (!wrapper.firstChild || wrapper.offsetHeight < 50) {
    try { root.unmount(); } catch (_) {}
    document.body.removeChild(wrapper);
    throw new Error('PDF לא נטען כראוי — נסי שוב');
  }

  const opt = {
    margin: [10, 10, 10, 10],
    filename: filename,
    image: { type: 'jpeg', quality: 0.95 },
    html2canvas: {
      scale: 2,
      useCORS: true,
      letterRendering: true,
      backgroundColor: '#ffffff',
      logging: false,
      // Make html2canvas happy by ignoring our offscreen positioning
      windowWidth: 800,
    },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
  };

  try {
    // Target the inner paper element directly if possible, else the wrapper
    const target = wrapper.querySelector('.paper-doc') || wrapper;
    const blob = await html2pdf().set(opt).from(target).outputPdf('blob');
    const reader = new FileReader();
    const base64 = await new Promise((resolve, reject) => {
      reader.onload = () => {
        const result = reader.result; // "data:application/pdf;base64,XXXX"
        const base64Str = result.split(',')[1];
        resolve(base64Str);
      };
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
    return base64;
  } finally {
    try { root.unmount(); } catch (_) {}
    if (wrapper.parentNode) document.body.removeChild(wrapper);
  }
}

// Send email with PDF via backend
async function sendEmailViaBackend({ to, subject, body, pdfBase64, pdfName, fromName }) {
  const cfg = loadConfig();
  if (!cfg || !cfg.url || !cfg.secret) throw new Error('אין הגדרות סנכרון');
  const res = await fetch(cfg.url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({
      action: 'sendEmail',
      secret: cfg.secret,
      to, subject, body, pdfBase64, pdfName, fromName,
    }),
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'Email failed');
  return json;
}

function printDoc(element, title) {
  const w = window.open('', '_blank', 'width=850,height=1100');
  if (!w) { alert('נא לאפשר חלונות קופצים כדי להדפיס'); return; }
  w.document.write(`<!DOCTYPE html><html dir="rtl" lang="he"><head><meta charset="utf-8"><title>${title}</title>
    <style>
      @page { size: A4; margin: 15mm; }
      body { font-family: -apple-system, "Segoe UI", Arial, sans-serif; color: #111; margin: 0; direction: rtl; }
      * { box-sizing: border-box; }
    </style></head><body><div id="p"></div></body></html>`);
  w.document.close();
  const container = w.document.getElementById('p');
  const root = ReactDOM.createRoot(container);
  root.render(element);
  setTimeout(() => { w.print(); }, 400);
}
